<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinesh Kancharla — Data Engineer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --surface: #0f1419;
    --surface2: #161d26;
    --accent: #00d4ff;
    --accent2: #7b61ff;
    --accent3: #00ff9d;
    --text: #e8edf2;
    --muted: #6b7a8d;
    --border: rgba(255,255,255,0.07);
    --glow: 0 0 40px rgba(0,212,255,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
    cursor: default;
  }

  /* ── Noise overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.5;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem 3rem;
    background: rgba(8,12,16,0.8);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    letter-spacing: -0.02em;
    color: var(--accent);
  }

  .nav-links {
    display: flex;
    gap: 2.5rem;
    list-style: none;
  }

  .nav-links a {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: var(--accent); }

  /* ── HERO ── */
  #hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    padding: 8rem 3rem 5rem;
  }

  /* Grid background */
  #hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 0%, transparent 100%);
  }

  /* Ambient blobs */
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    animation: drift 8s ease-in-out infinite alternate;
  }

  .blob-1 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(0,212,255,0.12) 0%, transparent 70%);
    top: -100px; left: -100px;
    animation-delay: 0s;
  }

  .blob-2 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(123,97,255,0.1) 0%, transparent 70%);
    bottom: 0; right: -50px;
    animation-delay: -4s;
  }

  .blob-3 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(0,255,157,0.07) 0%, transparent 70%);
    top: 50%; right: 20%;
    animation-delay: -2s;
  }

  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(30px, 20px) scale(1.05); }
  }

  .hero-inner {
    position: relative;
    text-align: center;
    max-width: 900px;
  }

  .hero-tag {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid rgba(0,212,255,0.3);
    padding: 0.4rem 1rem;
    border-radius: 100px;
    margin-bottom: 2rem;
    animation: fadeUp 0.8s ease both;
  }

  .hero-tag::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  .hero-name {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(3.5rem, 9vw, 7.5rem);
    line-height: 0.95;
    letter-spacing: -0.04em;
    margin-bottom: 0.3em;
    animation: fadeUp 0.8s ease 0.1s both;
  }

  .hero-name span {
    display: block;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 50%, var(--accent3) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-title {
    font-family: 'DM Mono', monospace;
    font-size: clamp(0.9rem, 2vw, 1.1rem);
    color: var(--muted);
    letter-spacing: 0.05em;
    margin-bottom: 2.5rem;
    animation: fadeUp 0.8s ease 0.2s both;
  }

  .hero-title b { color: var(--text); font-weight: 400; }

  .hero-objective {
    max-width: 600px;
    margin: 0 auto 3rem;
    font-size: 1rem;
    line-height: 1.7;
    color: var(--muted);
    animation: fadeUp 0.8s ease 0.3s both;
  }

  .hero-links {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
    animation: fadeUp 0.8s ease 0.4s both;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.75rem 1.75rem;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    letter-spacing: 0.05em;
    text-decoration: none;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--accent);
    color: var(--bg);
    font-weight: 600;
  }

  .btn-primary:hover {
    background: #33ddff;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,212,255,0.3);
  }

  .btn-ghost {
    border: 1px solid var(--border);
    color: var(--muted);
    background: transparent;
  }

  .btn-ghost:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-2px);
  }

  .hero-meta {
    display: flex;
    gap: 3rem;
    margin-top: 3rem;
    animation: fadeUp 0.8s ease 0.5s both;
    flex-wrap: wrap;
    justify-content: center;
  }

  .meta-item {
    text-align: center;
  }

  .meta-value {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.6rem;
    color: var(--accent);
  }

  .meta-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 0.2rem;
  }

  /* ── SECTIONS ── */
  section {
    padding: 6rem 3rem;
    max-width: 1200px;
    margin: 0 auto;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.75rem;
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: clamp(2rem, 4vw, 3rem);
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin-bottom: 3rem;
  }

  /* ── SKILLS ── */
  .skills-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.5rem;
  }

  .skill-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.75rem;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .skill-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s;
  }

  .skill-card:hover::before { transform: scaleX(1); }

  .skill-card:hover {
    border-color: rgba(0,212,255,0.2);
    transform: translateY(-4px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.3), var(--glow);
  }

  .skill-icon {
    width: 44px; height: 44px;
    border-radius: 10px;
    display: grid;
    place-items: center;
    font-size: 1.3rem;
    margin-bottom: 1rem;
    background: var(--surface2);
  }

  .skill-cat {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.4rem;
  }

  .skill-name {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 1rem;
    margin-bottom: 0.75rem;
  }

  .skill-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }

  .tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    padding: 0.25rem 0.65rem;
    border-radius: 100px;
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
    letter-spacing: 0.03em;
  }

  /* ── PROJECTS ── */
  .projects-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
  }

  @media (max-width: 768px) {
    .projects-grid { grid-template-columns: 1fr; }
    nav { padding: 1rem 1.5rem; }
    .nav-links { display: none; }
    section { padding: 4rem 1.5rem; }
    .hero-meta { flex-direction: column; gap: 1rem; position: static; margin-top: 3rem; }
  }

  .project-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.25rem;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .project-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 80% 20%, rgba(0,212,255,0.05) 0%, transparent 60%);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .project-card:hover::after { opacity: 1; }

  .project-card:hover {
    border-color: rgba(0,212,255,0.25);
    transform: translateY(-6px);
    box-shadow: 0 30px 60px rgba(0,0,0,0.4);
  }

  .project-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    margin-bottom: 1.25rem;
  }

  .project-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.4rem;
    letter-spacing: -0.02em;
    margin-bottom: 0.5rem;
  }

  .project-tools {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent2);
    letter-spacing: 0.05em;
    margin-bottom: 1.25rem;
  }

  .project-points {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .project-points li {
    font-size: 0.88rem;
    line-height: 1.6;
    color: var(--muted);
    padding-left: 1.25rem;
    position: relative;
  }

  .project-points li::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--accent3);
    font-size: 0.75rem;
  }

  /* ── ARCHITECTURE BADGE ── */
  .arch-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 1.25rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.35rem 0.9rem;
    border-radius: 100px;
    background: rgba(0,255,157,0.08);
    color: var(--accent3);
    border: 1px solid rgba(0,255,157,0.2);
  }

  /* ── EDUCATION ── */
  .edu-list {
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  .edu-item {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 1.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.5rem 2rem;
    transition: all 0.2s;
  }

  .edu-item:hover {
    border-color: rgba(0,212,255,0.2);
    transform: translateX(6px);
  }

  .edu-year {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    white-space: nowrap;
  }

  .edu-school {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.2rem;
  }

  .edu-degree {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 1.05rem;
  }

  .edu-score {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.4rem;
    color: var(--accent3);
    white-space: nowrap;
  }

  /* ── INTERNSHIP & CERT ── */
  .exp-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem;
    position: relative;
    overflow: hidden;
  }

  .exp-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, var(--accent), var(--accent2));
  }

  .exp-role {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.5rem;
    letter-spacing: -0.02em;
    margin-bottom: 0.25rem;
  }

  .exp-company {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }

  .exp-points {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.9rem;
  }

  .exp-points li {
    font-size: 0.93rem;
    line-height: 1.65;
    color: var(--muted);
    padding-left: 1.4rem;
    position: relative;
  }

  .exp-points li::before {
    content: '◆';
    position: absolute;
    left: 0;
    font-size: 0.4rem;
    top: 0.45em;
    color: var(--accent);
  }

  /* ── CERT ── */
  .cert-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.75rem 2rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    transition: all 0.2s;
  }

  .cert-card:hover {
    border-color: rgba(0,212,255,0.2);
    transform: translateY(-3px);
    box-shadow: var(--glow);
  }

  .cert-icon {
    width: 52px; height: 52px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    display: grid;
    place-items: center;
    font-size: 1.5rem;
    flex-shrink: 0;
  }

  .cert-name {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 1.05rem;
  }

  .cert-issuer {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 0.2rem;
  }

  .cert-desc {
    font-size: 0.82rem;
    color: var(--muted);
    margin-top: 0.4rem;
    line-height: 1.5;
  }

  /* ── ACHIEVEMENTS ── */
  .achieve-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
  }

  @media (max-width: 600px) {
    .achieve-grid, .projects-grid { grid-template-columns: 1fr; }
    .edu-item { grid-template-columns: 1fr; gap: 0.5rem; }
  }

  .achieve-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.75rem;
    transition: all 0.3s;
  }

  .achieve-card:hover {
    border-color: rgba(123,97,255,0.3);
    transform: translateY(-4px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.3), 0 0 30px rgba(123,97,255,0.08);
  }

  .achieve-emoji {
    font-size: 1.8rem;
    margin-bottom: 1rem;
  }

  .achieve-title {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 1rem;
    margin-bottom: 0.6rem;
  }

  .achieve-desc {
    font-size: 0.85rem;
    line-height: 1.6;
    color: var(--muted);
  }

  /* ── CONTACT BAR ── */
  #contact {
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 4rem 3rem;
    margin: 0;
    max-width: 100%;
  }

  .contact-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 2rem;
    flex-wrap: wrap;
  }

  .contact-heading {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(1.8rem, 4vw, 3rem);
    letter-spacing: -0.03em;
  }

  .contact-heading span {
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .contact-links {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
  }

  /* ── RESUME ── */
  .resume-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem;
  }

  .resume-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1.5rem;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }

  .resume-name {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.8rem;
    letter-spacing: -0.03em;
  }

  .resume-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    letter-spacing: 0.05em;
    margin-top: 0.3rem;
  }

  .resume-contact-row {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 1.5rem;
  }

  .resume-section {
    margin-bottom: 1.75rem;
    padding-bottom: 1.75rem;
    border-bottom: 1px solid var(--border);
  }

  .resume-section:last-child {
    border-bottom: none;
    margin-bottom: 0;
    padding-bottom: 0;
  }

  .resume-sec-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1rem;
  }

  .resume-text {
    font-size: 0.88rem;
    line-height: 1.7;
    color: var(--muted);
  }

  .resume-skills-table { display: flex; flex-direction: column; gap: 0.5rem; }

  .rs-row {
    display: grid;
    grid-template-columns: 160px 1fr;
    gap: 1rem;
    font-size: 0.85rem;
  }

  .rs-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  .rs-val { color: var(--muted); }

  .resume-proj-title {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    margin-bottom: 0.5rem;
  }

  .resume-proj-title span {
    font-family: 'DM Mono', monospace;
    font-weight: 400;
    font-size: 0.7rem;
    color: var(--accent2);
  }

  .resume-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .resume-list li {
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 1.6;
    padding-left: 1.1rem;
    position: relative;
  }

  .resume-list li::before {
    content: '·';
    position: absolute;
